<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Atlas Transfer — international money transfers at the mid-market rate." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f8f8fa" />
    <!--
      Theme bootstrap — MUST stay inline and blocking in <head> so the class
      is on <html> before first paint. Any deferred/async alternative produces
      a light→dark flash on dark-mode reload. See AI-5.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isOverride = stored === 'light' || stored === 'dark';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = isOverride ? stored : (prefersDark ? 'dark' : 'light');
          var root = document.documentElement;
          root.classList.toggle('dark', mode === 'dark');
          root.classList.toggle('light', mode === 'light');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', mode === 'dark' ? '#0c0d13' : '#f8f8fa');
          window.__themeApplied = { theme: mode, source: isOverride ? 'override' : 'system' };
        } catch (e) {}
      })();
    </script>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2317182a'/%3E%3Ctext x='16' y='21.5' text-anchor='middle' font-family='system-ui,sans-serif' font-size='17' font-weight='700' fill='%23ffffff' letter-spacing='-1'%3EA%3C/text%3E%3C/svg%3E"
    />
    <title>Atlas Transfer — Send money abroad</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
    <script src="http://localhost:4319/widget.js" defer></script>
    <autotel-devtools></autotel-devtools>
  </body>
</html>
